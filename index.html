<!-- index.html - Version Premium (ajout bouton invite et profil enrichi) -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>LinguaVillage</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="debug" style="position:fixed;top:0;left:0;right:0;background:#4ecf70;color:#0a0a14;font-size:11px;padding:2px 6px;z-index:99999;font-family:monospace;">✅ Chargement...</div>
<div id="notif"></div>
<div id="wordPopup">...</div>
<div id="weatherOverlay"></div>

<!-- ====== S1: WELCOME ====== (inchangé) -->
<div class="screen active" id="screen-welcome">...</div>

<!-- ====== S2: MAIN MENU ====== -->
<div class="screen" id="screen-menu">
  <div class="menu-header">...</div>
  <div class="menu-content">
    <div class="menu-title" id="menu-title-text">Que voulez-vous faire ?</div>
    <div class="menu-subtitle" id="menu-sub-text">Choisissez votre mode d'apprentissage</div>
    <div class="menu-btns">...</div>
    <!-- Boutons existants -->
    <button class="menu-dict-btn" onclick="inviteFriend()" style="border-color:rgba(78,207,112,0.3);margin-top:8px;">
      <div class="menu-dict-icon">🤝</div>
      <div class="menu-dict-text">
        <div class="menu-dict-title">Inviter un ami</div>
        <div class="menu-dict-sub">Parrainage & récompenses</div>
      </div>
      <span style="color:var(--green);">›</span>
    </button>
    <button class="menu-dict-btn" onclick="openWordGame()" style="border-color:rgba(192,132,252,0.3);margin-top:8px;">...</button>
  </div>
</div>

<!-- ====== S3: VILLAGE ====== (inchangé) -->
<div class="screen" id="screen-village">...</div>

<!-- ====== S4: LOCATION ====== (inchangé) -->
<div class="screen" id="screen-location">...</div>

<!-- ====== S5: DIALOGUE ====== (inchangé) -->
<div class="screen" id="screen-dialogue">...</div>

<!-- ====== S6: VOCABULAIRE ====== (inchangé) -->
<div class="screen" id="screen-vocab">...</div>

<!-- ====== S7: PHRASES ====== (inchangé) -->
<div class="screen" id="screen-phrases">...</div>

<!-- ====== S8: GRAMMAIRE ====== (inchangé) -->
<div class="screen" id="screen-grammar">...</div>

<!-- ====== S9: DICTIONARY ====== (inchangé) -->
<div class="screen" id="screen-dict">...</div>

<!-- ====== S10: CINEMA ====== (inchangé) -->
<div class="screen" id="screen-cinema">...</div>

<!-- ====== S11: PROFILE (ajout des sections favoris et mots difficiles) ====== -->
<div class="screen" id="screen-profile">
  <div class="u-header">...</div>
  <div class="profile-header">...</div>
  <div class="profile-stats">...</div>
  <div class="achievements">...</div>
  <div class="settings">...</div>
  <!-- Nouveaux blocs -->
  <div class="profile-section">
    <div class="ach-title">⭐ Mots favoris</div>
    <div id="favWordsList" class="fav-words-list"></div>
  </div>
  <div class="profile-section">
    <div class="ach-title">⚠️ Mots difficiles</div>
    <div id="weakWordsList" class="weak-words-list"></div>
  </div>
</div>

<!-- Scripts (même ordre que précédemment) -->
<script src="js/state.js"></script>
<script src="js/save.js"></script>
<script src="js/data.js"></script>
<script src="js/player.js"></script>
<script src="js/village.js"></script>
<script src="js/memory.js"></script>
<script src="js/phonemes.js"></script>
<script src="js/sprites.js"></script>
<script src="js/pnj.js"></script>
<script src="js/dialogue.js"></script>
<script src="js/gamification.js"></script>
<script src="js/learning.js"></script>
<script src="js/cinema.js"></script>
<script src="js/advanced.js"></script>
<script src="js/quote.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/wordgame.js"></script>
<script src="js/app.js"></script>

</body>
</html>
