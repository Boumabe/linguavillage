<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>LinguaVillage</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700;--gold-dim:#c8a030;--bg:#0a0a14;--bg-card:rgba(255,255,255,0.05);
  --border:rgba(255,215,0,0.18);--text:#f0e8d0;--dim:#9a8a70;
  --green:#4ecf70;--blue:#4a9eff;--purple:#a78bfa;--orange:#ff9f43;--red:#e05555;
  --village:#ff6b6b;--vocab:#4ecf70;--phrases:#4a9eff;--grammar:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);}
.screen{display:none;width:100%;height:100vh;position:relative;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}

/* NOTIF */
#notif{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,8,20,0.97);border:2px solid var(--gold);border-radius:30px;padding:9px 22px;color:var(--gold);font-weight:800;font-size:0.85rem;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* WORD POPUP */
#wordPopup{position:fixed;z-index:8000;background:linear-gradient(135deg,#16102a,#0a0a14);border:2px solid var(--gold);border-radius:18px;padding:16px 18px;min-width:200px;max-width:270px;box-shadow:0 8px 40px rgba(0,0,0,0.9);opacity:0;pointer-events:none;transition:all 0.2s;transform:translateY(10px);}
#wordPopup.show{opacity:1;pointer-events:all;transform:translateY(0);}
.wp-word{font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:3px;}
.wp-roman{font-size:0.85rem;color:var(--orange);font-weight:700;margin-bottom:4px;}
.wp-translation{font-size:0.85rem;color:var(--dim);margin-bottom:6px;}
.wp-grammar{font-size:0.72rem;color:#6a9a6a;font-style:italic;padding:5px 8px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:8px;}
.wp-listen{background:rgba(255,215,0,0.12);border:1px solid var(--border);color:var(--gold);padding:5px 14px;border-radius:20px;font-size:0.75rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.wp-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--dim);font-size:1rem;cursor:pointer;}

/* WEATHER */
#weatherOverlay{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;}
.rain-drop{position:absolute;width:1px;background:linear-gradient(transparent,rgba(120,180,255,0.5));animation:rainFall linear infinite;}
@keyframes rainFall{0%{transform:translateY(-20px)}100%{transform:translateY(110vh)}}
.snow-flake{position:absolute;color:white;animation:snowFall linear infinite;}
@keyframes snowFall{0%{transform:translateY(-20px) rotate(0deg)}100%{transform:translateY(110vh) rotate(360deg)}}

/* ===== SCREEN 1: WELCOME ===== */
#screen-welcome{background:radial-gradient(ellipse at 50% -10%,#1a2a5a 0%,#0a0a14 65%);align-items:center;justify-content:center;overflow-y:auto;}
.w-stars{position:absolute;inset:0;pointer-events:none;}
.w-star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.9}}
.logo{font-family:'Cinzel',serif;font-size:clamp(1.8rem,7vw,3.5rem);font-weight:900;color:var(--gold);letter-spacing:3px;text-shadow:0 0 50px rgba(255,215,0,0.4);animation:glow 3s ease-in-out infinite;z-index:1;margin-bottom:4px;}
@keyframes glow{0%,100%{text-shadow:0 0 30px rgba(255,215,0,0.3)}50%{text-shadow:0 0 70px rgba(255,215,0,0.7)}}
.logo-sub{font-size:0.85rem;color:#8aaad0;letter-spacing:2px;margin-bottom:22px;z-index:1;}
.welcome-form{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:20px;width:min(390px,92vw);display:flex;flex-direction:column;gap:13px;z-index:1;backdrop-filter:blur(8px);margin-bottom:16px;}
.flabel{font-size:0.68rem;font-weight:900;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.finput{width:100%;background:rgba(255,255,255,0.07);border:2px solid var(--border);border-radius:12px;padding:10px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:700;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:var(--gold);}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.tile{background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:12px;padding:8px 3px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--dim);}
.tile .tf{font-size:1.4rem;display:block;margin-bottom:3px;}
.tile .tn{font-size:0.62rem;font-weight:800;line-height:1.2;}
.tile:hover,.tile.sel{background:rgba(255,215,0,0.13);border-color:var(--gold);color:var(--gold);}
.tile.disabled{opacity:0.3;pointer-events:none;}
.script-row{display:flex;gap:7px;}
.sc-btn{flex:1;background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:12px;padding:9px 6px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--dim);}
.sc-btn .sc-main{font-size:1rem;font-weight:900;display:block;margin-bottom:2px;}
.sc-btn .sc-sub{font-size:0.6rem;color:var(--dim);}
.sc-btn:hover,.sc-btn.sel{background:rgba(255,215,0,0.13);border-color:var(--gold);color:var(--gold);}
.play-btn{background:linear-gradient(135deg,#a86800,#ffd700,#a86800);color:#1a0800;border:none;padding:13px;border-radius:14px;font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,215,0,0.25);}
.play-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,0.45);}
.play-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ===== SCREEN 2: MAIN MENU ===== */
#screen-menu{background:radial-gradient(ellipse at 50% 0%,#0f1a30 0%,#0a0a14 70%);align-items:center;justify-content:center;}
.menu-header{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,8,20,0.8);border-bottom:1px solid var(--border);}
.menu-player{font-weight:900;font-size:0.88rem;color:var(--gold);}
.menu-xp{display:flex;align-items:center;gap:6px;}
.menu-xp-label{font-size:0.72rem;color:var(--dim);}
.xp-bar-bg{width:80px;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#a86800,#ffd700);border-radius:4px;transition:width 0.5s;width:0%;}
.menu-lang{font-size:0.75rem;font-weight:800;color:var(--dim);}
.menu-content{display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 20px 20px;width:100%;max-width:420px;}
.menu-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-align:center;margin-bottom:4px;}
.menu-subtitle{font-size:0.78rem;color:var(--dim);text-align:center;margin-bottom:8px;}
.menu-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.menu-btn{border:none;border-radius:18px;padding:18px 14px;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;align-items:flex-start;gap:6px;position:relative;overflow:hidden;}
.menu-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);pointer-events:none;}
.menu-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.menu-btn:active{transform:translateY(0);}
.menu-btn.village{background:linear-gradient(135deg,#3d1515,#5a2020);border:1px solid rgba(255,107,107,0.3);}
.menu-btn.vocab{background:linear-gradient(135deg,#0d3322,#1a5a3a);border:1px solid rgba(78,207,112,0.3);}
.menu-btn.phrases{background:linear-gradient(135deg,#0d1f3d,#1a3a6a);border:1px solid rgba(74,158,255,0.3);}
.menu-btn.grammar{background:linear-gradient(135deg,#1e1040,#2d1a5a);border:1px solid rgba(167,139,250,0.3);}
.menu-btn .btn-icon{font-size:1.8rem;}
.menu-btn .btn-title{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:white;}
.menu-btn .btn-desc{font-size:0.68rem;color:rgba(255,255,255,0.55);line-height:1.4;}
.menu-btn .btn-badge{position:absolute;top:10px;right:10px;font-size:0.6rem;font-weight:900;padding:3px 7px;border-radius:10px;letter-spacing:0.5px;}
.menu-btn.village .btn-badge{background:rgba(255,107,107,0.2);color:#ff6b6b;}
.menu-btn.vocab .btn-badge{background:rgba(78,207,112,0.2);color:#4ecf70;}
.menu-btn.phrases .btn-badge{background:rgba(74,158,255,0.2);color:#4a9eff;}
.menu-btn.grammar .btn-badge{background:rgba(167,139,250,0.2);color:#a78bfa;}
.menu-dict-btn{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.menu-dict-btn:hover{background:rgba(255,215,0,0.08);border-color:var(--gold);}
.menu-dict-icon{font-size:1.4rem;}
.menu-dict-text{text-align:left;}
.menu-dict-title{font-size:0.85rem;font-weight:800;color:var(--text);}
.menu-dict-sub{font-size:0.68rem;color:var(--dim);}

/* ===== UNIVERSAL HEADER ===== */
.u-header{background:rgba(10,8,20,0.97);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:15px;font-size:0.75rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;white-space:nowrap;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.u-title{font-family:'Cinzel',serif;font-size:0.95rem;flex:1;}
.u-badge{font-size:0.7rem;font-weight:800;padding:3px 10px;border-radius:20px;}

/* ===== VILLAGE ===== */
#screen-village{overflow:hidden;}
.village-hud{position:absolute;top:0;left:0;right:0;height:50px;z-index:100;background:linear-gradient(180deg,rgba(10,8,20,0.97),rgba(10,8,20,0.7));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;}
.hud-player{font-weight:900;font-size:0.82rem;color:var(--gold);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hud-weather{font-size:1.1rem;}
.hud-time{font-size:0.68rem;color:var(--dim);}
.hud-lang{background:rgba(255,215,0,0.1);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:0.68rem;font-weight:800;color:var(--gold-dim);}
.hud-xp{font-size:0.68rem;color:var(--dim);margin-left:auto;}
.hud-btns{display:flex;gap:4px;margin-left:6px;}
.hud-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:12px;font-size:0.68rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;}
.hud-btn:hover{border-color:var(--gold);color:var(--gold);}
#villageCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer;}
.loc-tooltip{position:absolute;background:rgba(10,6,2,0.92);border:1px solid var(--gold);border-radius:10px;padding:5px 11px;font-size:0.72rem;font-weight:800;color:var(--gold);pointer-events:none;z-index:50;white-space:nowrap;transform:translate(-50%,-100%);opacity:0;transition:opacity 0.2s;}
.loc-tooltip.show{opacity:1;}

/* ===== LOCATION ===== */
#screen-location{overflow:hidden;}
.npc-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.npc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.22s;}
.npc-card:hover{background:rgba(255,215,0,0.07);border-color:rgba(255,215,0,0.35);transform:translateX(4px);}
.npc-av{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}
.npc-info{flex:1;}
.npc-name{font-weight:900;font-size:0.95rem;}
.npc-role{font-size:0.72rem;color:var(--dim);margin-top:2px;}
.npc-hint{font-size:0.72rem;color:var(--gold-dim);margin-top:4px;font-style:italic;}

/* ===== DIALOGUE ===== */
#screen-dialogue{overflow:hidden;}
.dial-header{background:rgba(10,8,20,0.97);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.dial-av{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.dial-name{font-weight:900;font-size:0.9rem;color:var(--gold);}
.dial-role{font-size:0.68rem;color:var(--dim);}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:86%;}
.msg.npc{align-self:flex-start;}
.msg.player{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
.msg-bubble{padding:9px 13px;border-radius:15px;font-size:0.88rem;line-height:1.45;font-weight:600;}
.msg.npc .msg-bubble{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg.player .msg-bubble{background:linear-gradient(135deg,rgba(255,215,0,0.18),rgba(255,150,0,0.12));border:1px solid rgba(255,215,0,0.25);border-bottom-right-radius:3px;}
.msg.system .msg-bubble{background:transparent;border:none;font-size:0.7rem;color:var(--dim);font-style:italic;text-align:center;padding:3px 8px;}
.msg.system{align-self:center;max-width:100%;}
.clickable-word{cursor:pointer;border-radius:3px;padding:0 2px;transition:all 0.15s;}
.clickable-word:hover{background:rgba(255,215,0,0.18);color:var(--gold);}

/* Spell checker underline */
.spell-error{border-bottom:2px wavy #e05555;cursor:help;}

.typing-ind{display:flex;gap:4px;align-items:center;padding:5px 0;}
.td{width:6px;height:6px;background:var(--gold-dim);border-radius:50%;animation:tb 1.2s infinite;}
.td:nth-child(2){animation-delay:0.2s;}
.td:nth-child(3){animation-delay:0.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

.dial-input-area{padding:10px 12px 14px;background:rgba(10,8,20,0.95);border-top:1px solid var(--border);flex-shrink:0;}
.dial-input-wrap{position:relative;}
.dial-input{width:100%;background:rgba(255,255,255,0.06);border:2px solid var(--border);border-radius:25px;padding:10px 50px 10px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:700;outline:none;transition:border-color 0.2s;}
.dial-input:focus{border-color:var(--gold);}
.dial-send{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#a86800,#ffd700);color:#1a0800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;}
.dial-send:disabled{opacity:0.4;cursor:not-allowed;}
.dial-actions{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.d-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:4px 10px;border-radius:15px;font-size:0.7rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;}
.d-btn:hover{border-color:var(--gold);color:var(--gold);}
.d-btn.voice{border-color:rgba(78,207,112,0.3);color:var(--green);}
.d-btn.voice.rec{border-color:var(--red);color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.correction-panel{margin-top:8px;display:none;background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.25);border-radius:10px;padding:10px 12px;}
.correction-panel.show{display:block;}
.correction-panel.ok{background:rgba(78,207,112,0.08);border-color:rgba(78,207,112,0.25);}
.corr-title{font-size:0.7rem;font-weight:900;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.correction-panel.ok .corr-title{color:var(--green);}
.corr-original{font-size:0.8rem;color:var(--dim);margin-bottom:4px;text-decoration:line-through;}
.corr-corrected{font-size:0.88rem;font-weight:800;color:var(--text);margin-bottom:4px;}
.corr-explain{font-size:0.75rem;color:var(--dim);font-style:italic;}

/* ===== VOCAB SCREEN ===== */
#screen-vocab{overflow:hidden;}
.vocab-cats{display:flex;gap:0;background:rgba(10,8,20,0.9);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.vcat{flex:0 0 auto;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:11px 14px 9px;font-size:0.72rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s;}
.vcat.active{color:var(--green);border-bottom-color:var(--green);}
.vocab-search{padding:10px 14px;background:rgba(10,8,20,0.7);border-bottom:1px solid var(--border);flex-shrink:0;}
.vsearch{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:8px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.88rem;outline:none;}
.vsearch:focus{border-color:var(--green);}
.vocab-list{flex:1;overflow-y:auto;padding:12px 14px;}
.vocab-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:10px;}
.vocab-item:last-child{border-bottom:none;}
.vi-native{font-size:0.8rem;color:var(--dim);flex:1;}
.vi-target{text-align:right;flex:1;}
.vi-word{font-size:0.92rem;font-weight:800;color:var(--text);}
.vi-roman{font-size:0.68rem;color:var(--orange);display:block;}
.vi-listen{background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.9rem;padding:2px 6px;border-radius:8px;transition:all 0.15s;}
.vi-listen:hover{color:var(--gold);background:rgba(255,215,0,0.1);}
.cat-header{font-size:0.65rem;font-weight:900;color:var(--dim);letter-spacing:2px;text-transform:uppercase;padding:12px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.vocab-count{font-size:0.68rem;color:var(--green);font-weight:800;}

/* ===== PHRASES SCREEN ===== */
#screen-phrases{overflow:hidden;}
.phrase-cats{display:flex;gap:0;background:rgba(10,8,20,0.9);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.pcat{flex:0 0 auto;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:11px 14px 9px;font-size:0.72rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s;}
.pcat.active{color:var(--blue);border-bottom-color:var(--blue);}
.phrase-list{flex:1;overflow-y:auto;padding:12px 14px;}
.phrase-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
.phrase-item:hover{background:rgba(74,158,255,0.08);border-color:rgba(74,158,255,0.3);}
.pi-native{font-size:0.75rem;color:var(--dim);margin-bottom:5px;}
.pi-target{font-size:0.92rem;font-weight:800;color:var(--text);margin-bottom:3px;}
.pi-roman{font-size:0.68rem;color:var(--orange);}
.pi-actions{display:flex;gap:6px;margin-top:8px;}
.pi-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:3px 10px;border-radius:12px;font-size:0.68rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s;}
.pi-btn:hover{border-color:var(--blue);color:var(--blue);}

/* ===== GRAMMAR SCREEN ===== */
#screen-grammar{overflow:hidden;}
.grammar-cats{display:flex;gap:0;background:rgba(10,8,20,0.9);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.gcat{flex:0 0 auto;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:11px 12px 9px;font-size:0.7rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s;}
.gcat.active{color:var(--purple);border-bottom-color:var(--purple);}
.grammar-body{flex:1;overflow-y:auto;padding:14px;}
.gram-section{margin-bottom:18px;}
.gram-title{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.gram-tag{font-size:0.6rem;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);color:var(--purple);padding:2px 8px;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;}
.gram-explanation{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:0.82rem;line-height:1.55;color:var(--text);}
.gram-explanation strong{color:var(--purple);}
.gram-explanation em{color:var(--orange);font-style:normal;font-weight:700;}
.gram-formula{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:8px 12px;font-family:monospace;font-size:0.82rem;color:var(--gold);margin-bottom:10px;text-align:center;}
.gram-examples{display:flex;flex-direction:column;gap:6px;}
.gram-ex{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.gram-ex-native{font-size:0.75rem;color:var(--dim);flex:1;}
.gram-ex-target{font-size:0.85rem;font-weight:800;flex:1;text-align:right;}
.gram-ex-target .roman{display:block;font-size:0.65rem;color:var(--orange);font-weight:700;}

/* ===== DICTIONARY ===== */
#screen-dict{overflow:hidden;}
.dict-search-area{padding:12px 14px;background:rgba(10,8,20,0.7);border-bottom:1px solid var(--border);flex-shrink:0;}
.dict-row{display:flex;gap:8px;align-items:center;}
.dict-input{flex:1;background:rgba(255,255,255,0.06);border:2px solid var(--border);border-radius:25px;padding:10px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;outline:none;transition:border-color 0.2s;}
.dict-input:focus{border-color:var(--gold);}
.dict-search-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#a86800,#ffd700);color:#1a0800;font-size:1rem;cursor:pointer;font-weight:900;flex-shrink:0;}
.dict-modes{display:flex;gap:7px;margin-top:9px;}
.dict-mode{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:5px 8px;font-size:0.7rem;font-weight:800;cursor:pointer;color:var(--dim);font-family:'Nunito',sans-serif;text-align:center;transition:all 0.2s;}
.dict-mode.active{background:rgba(255,215,0,0.12);border-color:var(--gold);color:var(--gold);}
.dict-result{flex:1;overflow-y:auto;padding:14px;}
.dict-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.dict-word{font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:3px;}
.dict-roman{font-size:0.85rem;color:var(--orange);font-weight:700;margin-bottom:5px;}
.dict-meaning{font-size:0.85rem;line-height:1.4;margin-bottom:6px;}
.dict-example{font-size:0.75rem;color:var(--dim);font-style:italic;padding:7px 10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-top:6px;}
.dict-listen-btn{margin-top:10px;background:rgba(255,215,0,0.1);border:1px solid var(--border);color:var(--gold);padding:5px 14px;border-radius:18px;font-size:0.72rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.dict-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.dict-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:4px 11px;font-size:0.72rem;font-weight:700;cursor:pointer;color:var(--dim);transition:all 0.2s;}
.dict-chip:hover{border-color:var(--gold);color:var(--gold);}
.dict-empty{text-align:center;padding:40px 20px;color:var(--dim);}
.dict-empty-icon{font-size:2.5rem;margin-bottom:10px;}


@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.15);border-radius:2px;}

// =================================================================
// CINEMA FUNCTIONS — Internet Archive embed
// =================================================================
let currentCinemaLang = '';
let currentCinemaCat  = '';

function openCinema(){
  currentCinemaLang = S.targetLang;
  const cats = getCinemaCats(currentCinemaLang);
  const langLabels = {en:'English',fr:'Français',es:'Español',ht:'Kreyòl',
                      de:'Deutsch',ru:'Русский',zh:'中文',ja:'日本語'};
  document.getElementById('cinema-title').textContent = '🎬 ' + (langLabels[currentCinemaLang]||'Cinéma');
  document.getElementById('cinema-lang-badge').textContent = FLAGS[currentCinemaLang]||'';
  document.getElementById('cinemaCats').innerHTML = cats.map((c,i)=>
    `<button onclick="loadCinemaCategory('${c.key}')" id="ccat-${c.key}"
       style="flex:0 0 auto;background:transparent;border:none;
              border-bottom:2px solid ${i===0?'#e040fb':'transparent'};
              color:${i===0?'#e040fb':'var(--dim)'};
              padding:10px 14px 8px;font-size:0.72rem;font-weight:800;
              cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;">
      ${c.icon} ${c.label}
    </button>`
  ).join('');
  if(cats.length) loadCinemaCategory(cats[0].key);
  showScreen('screen-cinema');
}

function loadCinemaCategory(catKey){
  currentCinemaCat = catKey;
  const cats = getCinemaCats(currentCinemaLang);
  cats.forEach(c=>{
    const el = document.getElementById('ccat-'+c.key);
    if(el){
      el.style.borderBottomColor = c.key===catKey ? '#e040fb' : 'transparent';
      el.style.color             = c.key===catKey ? '#e040fb' : 'var(--dim)';
    }
  });
  const videos = getCinemaVideos(currentCinemaLang, catKey);
  buildVideoGrid(videos);
}

function buildVideoGrid(videos){
  if(!videos.length){
    document.getElementById('videoList').innerHTML =
      `<div style="text-align:center;padding:40px;color:var(--dim)">
         <div style="font-size:2rem;margin-bottom:10px">🎬</div>
         <div>Bientôt disponible pour cette catégorie</div>
       </div>`;
    return;
  }
  document.getElementById('videoList').innerHTML = videos.map((v,i)=>`
    <div onclick="openArchiveVideo('${v.id}','${v.t.replace(/'/g,"&apos;")}')"
         style="background:var(--bg-card);border:1px solid rgba(224,64,251,0.18);
                border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s;
                display:flex;flex-direction:column;"
         onmouseover="this.style.borderColor='rgba(224,64,251,0.6)';this.style.transform='translateY(-2px)'"
         onmouseout="this.style.borderColor='rgba(224,64,251,0.18)';this.style.transform='translateY(0)'">
      <div style="position:relative;width:100%;padding-bottom:56.25%;background:linear-gradient(135deg,#1a0a2e,#0a0a14);flex-shrink:0;">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
          <div style="width:60px;height:60px;background:rgba(224,64,251,0.85);border-radius:50%;
                      display:flex;align-items:center;justify-content:center;font-size:1.6rem;
                      box-shadow:0 4px 20px rgba(224,64,251,0.4);">▶</div>
          <div style="font-size:0.65rem;color:rgba(255,255,255,0.5);letter-spacing:1px;">INTERNET ARCHIVE</div>
        </div>
        <div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.75);
                    padding:3px 8px;border-radius:8px;font-size:0.65rem;color:#fff;font-weight:800;">${v.diff||''}</div>
        <div style="position:absolute;bottom:6px;right:8px;background:rgba(224,64,251,0.85);
                    padding:2px 7px;border-radius:6px;font-size:0.6rem;color:#fff;font-weight:900;">🌐 LIBRE</div>
      </div>
      <div style="padding:10px 13px 12px;">
        <div style="font-size:0.82rem;font-weight:800;color:#e040fb;margin-bottom:4px;line-height:1.35;">${v.t}</div>
        <div style="font-size:0.7rem;color:var(--dim);line-height:1.4;">${v.d}</div>
        <div style="margin-top:7px;font-size:0.65rem;color:rgba(224,64,251,0.6);font-weight:700;">
          📚 Domaine public — Internet Archive
        </div>
      </div>
    </div>`
  ).join('');
}

// Ouvre le lecteur inline Internet Archive
function openArchiveVideo(id, title){
  const embedUrl = `https://archive.org/embed/${id}`;
  // Mettre à jour l'iframe du lecteur cinéma
  const player = document.getElementById('cinemaPlayer');
  if(player){
    player.src = embedUrl;
    player.style.display = 'block';
    document.getElementById('videoTitle').textContent = title||'';
    document.getElementById('videoDesc').textContent = '📚 Source: Internet Archive — Domaine public';
    document.getElementById('videoList').scrollIntoView({behavior:'smooth'});
  }
  gainXP(5);
  // Aussi proposer d'ouvrir directement
  showNotif('🎬 '+title.substring(0,30)+'...');
}

// État missions
let S_missions = {
  completed: {},  // {missionId: true}
  gems: 0,
  badges: [],
};

function getMissionsForLoc(locId){
  return MISSIONS[locId] || [];
}

function openMissionsPanel(locId){
  const missions = getMissionsForLoc(locId);
  if(!missions.length) return;
  const nl = S.nativeLang || 'fr';
  const panel = document.getElementById('missionsPanel');
  if(!panel) return;

  // Header
  let html = '<div style="padding:12px 16px 8px;background:rgba(255,215,0,0.06);border-bottom:1px solid var(--border);">'
    + '<div style="font-family:Cinzel,serif;font-size:0.9rem;color:var(--gold);margin-bottom:2px;">🎯 Missions</div>'
    + '<div style="font-size:0.68rem;color:var(--dim)">💎 ' + S_missions.gems + ' gemmes &middot; ' + Object.keys(S_missions.completed).length + ' missions complètes</div>'
    + '</div><div style="overflow-y:auto;max-height:220px;padding:8px;">';

  missions.forEach(function(m){
    var done = S_missions.completed[m.id];
    var title = (m.title[nl]||m.title.fr||'').replace(/'/g,"&apos;");
    var desc  = (m.desc[nl] ||m.desc.fr ||'').replace(/'/g,"&apos;");
    var hint  = (m.hint[nl] ||m.hint.fr ||'').replace(/'/g,"&apos;");
    var xpBadge = done ? '&#x2705;' : ('+'+m.xp+' XP &middot; '+'💎'.repeat(m.gem));
    var clickAttr = done ? '' : ('onclick="startMission(\'' + m.id + '\',\'' + locId + '\')"');
    html += '<div style="background:' + (done?'rgba(78,207,112,0.08)':'var(--bg-card)')
      + ';border:1px solid ' + (done?'rgba(78,207,112,0.3)':'var(--border)')
      + ';border-radius:12px;padding:10px 12px;margin-bottom:7px;cursor:'+(done?'default':'pointer')+';transition:all 0.2s;" '
      + clickAttr + '>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
      + '<span style="font-size:1.2rem">'+m.icon+'</span>'
      + '<span style="font-weight:900;font-size:0.85rem;color:'+(done?'var(--green)':'var(--text)')+'">'+title+'</span>'
      + '<span style="margin-left:auto;font-size:0.7rem;color:'+(done?'var(--green)':'var(--gold)')+'">'+xpBadge+'</span>'
      + '</div>'
      + '<div style="font-size:0.72rem;color:var(--dim)">'+desc+'</div>'
      + (done ? '' : '<div style="font-size:0.68rem;color:rgba(255,215,0,0.6);margin-top:5px;font-style:italic">💡 '+hint+'</div>')
      + '</div>';
  });

  html += '</div>';
  panel.innerHTML = html;
  panel.style.display = 'block';
}

let activeMission = null;
function startMission(missionId, locId){
  const missions = getMissionsForLoc(locId);
  activeMission = missions.find(m=>m.id===missionId);
  if(!activeMission) return;
  const nl = S.nativeLang || 'fr';
  showNotif('🎯 Mission: '+activeMission.title[nl]||activeMission.title.fr);
  // Highlight input
  const inp = document.getElementById('dialInput');
  if(inp){
    inp.placeholder = '💡 '+( activeMission.hint[nl]||activeMission.hint.fr);
    inp.style.borderColor='var(--gold)';
  }
}

function checkMissionInMessage(text){
  if(!activeMission) return;
  const lower = text.toLowerCase();
  const done = activeMission.check.some(kw=>lower.includes(kw.toLowerCase()));
  if(done){
    completeMission(activeMission);
    activeMission = null;
    const inp = document.getElementById('dialInput');
    if(inp){inp.placeholder='Votre réponse...';inp.style.borderColor='';}
  }
}

function completeMission(mission){
  if(S_missions.completed[mission.id]) return;
  S_missions.completed[mission.id] = true;
  S_missions.gems += mission.gem;
  gainXP(mission.xp);
  // Update gem display
  const gd = document.getElementById('gemDisplay');
  if(gd) gd.textContent = '💎 '+S_missions.gems;
  // Check badges
  checkBadges();
  // Celebrate
  const nl = S.nativeLang||'fr';
  showMissionReward(mission, nl);
}

function showMissionReward(mission, nl){
  const overlay = document.createElement('div');
  overlay.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;`;
  overlay.innerHTML=`
    <div style="background:linear-gradient(135deg,#1a0a2e,#0a0a14);border:2px solid var(--gold);border-radius:24px;padding:28px 32px;text-align:center;max-width:300px;animation:popIn 0.4s;">
      <div style="font-size:3rem;margin-bottom:8px;">${mission.icon}</div>
      <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:1.1rem;margin-bottom:4px;">✅ Mission réussie!</div>
      <div style="color:var(--text);font-size:0.9rem;font-weight:800;margin-bottom:12px;" id="missionRewardTitle"></div>
      <div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px;">
        <span style="background:rgba(255,215,0,0.15);border:1px solid var(--gold);border-radius:12px;padding:6px 14px;color:var(--gold);font-weight:900;">+${mission.xp} XP ⭐</span>
        <span style="background:rgba(100,200,255,0.15);border:1px solid #4a9eff;border-radius:12px;padding:6px 14px;color:#4a9eff;font-weight:900;">${'💎'.repeat(mission.gem)} x${mission.gem}</span>
      </div>
      <button onclick="this.parentElement.parentElement.remove()" style="background:linear-gradient(135deg,#a86800,#ffd700);border:none;border-radius:12px;padding:10px 28px;font-family:'Cinzel',serif;font-weight:700;cursor:pointer;font-size:0.85rem;">🎉 Super!</button>
    </div>`;
  document.body.appendChild(overlay);
  var rt=document.getElementById('missionRewardTitle');
  if(rt) rt.textContent = mission.title[nl]||mission.title.fr;
  setTimeout(()=>overlay.remove(),4000);
  // Confetti effect
  launchConfetti();
}

function launchConfetti(){
  const colors=['#FFD700','#4ecf70','#4a9eff','#e040fb','#ff6b6b'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    c.style.cssText=`position:fixed;width:8px;height:8px;background:${color};border-radius:50%;
      left:${Math.random()*100}%;top:-10px;z-index:10000;
      animation:confettiFall ${1+Math.random()*2}s linear forwards;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

function checkBadges(){
  REWARDS.badges.forEach(badge=>{
    if(!S_missions.badges.includes(badge.id) && S.xp>=badge.xp){
      S_missions.badges.push(badge.id);
      showBadgeUnlocked(badge);
    }
  });
}

function showBadgeUnlocked(badge){
  const nl = S.nativeLang||'fr';
  setTimeout(()=>{
    showNotif(badge.icon+' Badge débloqué: '+(badge.name[nl]||badge.name.fr));
  },2000);
}

// Progression screen
function showProgression(){
  var nl = S.nativeLang||'fr';
  var totalMissions = Object.values(MISSIONS).flat().length;
  var done = Object.keys(S_missions.completed).length;
  var pct = Math.round((done/totalMissions)*100);
  var nextBadge = REWARDS.badges.find(function(b){return S.xp<b.xp;});
  var xpToNext = nextBadge ? nextBadge.xp - S.xp : 0;

  var overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9500;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:20px;';

  var badgesHTML = REWARDS.badges.map(function(b){
    var unlocked = S_missions.badges.includes(b.id);
    var name = (b.name[nl]||b.name.fr||'').replace(/'/g,"&apos;");
    return '<div style="background:'+(unlocked?'rgba(255,215,0,0.12)':'rgba(255,255,255,0.04)')
      +';border:1px solid '+(unlocked?'var(--gold)':'var(--border)')
      +';border-radius:12px;padding:8px 12px;text-align:center;opacity:'+(unlocked?1:0.4)+';">'
      +'<div style="font-size:1.3rem;">'+b.icon+'</div>'
      +'<div style="font-size:0.6rem;color:'+(unlocked?'var(--gold)':'var(--dim)')+';margin-top:2px;">'+name+'</div>'
      +'<div style="font-size:0.55rem;color:var(--dim);">'+b.xp+' XP</div></div>';
  }).join('');

  var missionsDetail = Object.entries(MISSIONS).map(function(entry){
    var loc=entry[0], ms=entry[1];
    var locName = ((LOC_NAMES[loc]||{})[nl]||loc).replace(/'/g,"&apos;");
    var rows = ms.map(function(m){
      var d2=S_missions.completed[m.id];
      var t=(m.title[nl]||m.title.fr||'').replace(/'/g,"&apos;");
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);">'
        +'<span>'+m.icon+'</span>'
        +'<span style="flex:1;font-size:0.75rem;color:'+(d2?'var(--green)':'var(--text)')+'">'+t+'</span>'
        +'<span style="font-size:0.7rem;color:'+(d2?'var(--green)':'var(--dim)')+'">'+( d2?'&#x2705;':'+'+m.xp+' XP')+'</span>'
        +'</div>';
    }).join('');
    return '<div style="margin-bottom:8px;"><div style="font-size:0.68rem;color:var(--gold-dim);font-weight:800;margin-bottom:4px;">'+locName+'</div>'+rows+'</div>';
  }).join('');

  var nextHTML = nextBadge
    ? '<div style="background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:12px;padding:12px;">'
      +'<div style="font-size:0.72rem;color:var(--gold);font-weight:800;margin-bottom:4px;">⚡ Prochain: '+(nextBadge.name[nl]||nextBadge.name.fr)+'</div>'
      +'<div style="font-size:0.68rem;color:var(--dim)">'+xpToNext+' XP restants</div>'
      +'<div style="height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:8px;overflow:hidden;">'
      +'<div style="height:100%;width:'+Math.round((S.xp/nextBadge.xp)*100)+'%;background:linear-gradient(90deg,#a86800,#ffd700);border-radius:3px;"></div></div></div>'
    : '<div style="text-align:center;padding:10px;color:var(--gold);font-family:Cinzel;font-size:0.9rem;">&#x1F451; Tous les badges!<\/div>';

  overlay.innerHTML = '<div style="background:linear-gradient(135deg,#0f1a30,#0a0a14);border:1px solid var(--border);border-radius:24px;padding:24px;max-width:400px;width:100%;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">'
    +'<div style="font-family:Cinzel,serif;font-size:1.1rem;color:var(--gold);">&#x1F4CA; Ma Progression</div>'
    +'<button onclick="this.closest('div[style*=position]').remove()" style="background:transparent;border:1px solid var(--border);color:var(--dim);padding:4px 10px;border-radius:12px;cursor:pointer;font-size:0.75rem;">&#x2715;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">'
    +'<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:var(--gold);">'+S.xp+'</div><div style="font-size:0.65rem;color:var(--dim);">XP Total</div></div>'
    +'<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:#4a9eff;">'+S_missions.gems+'</div><div style="font-size:0.65rem;color:var(--dim);">&#x1F48E; Gemmes</div></div>'
    +'<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:var(--green);">'+done+'/'+totalMissions+'</div><div style="font-size:0.65rem;color:var(--dim);">Missions</div></div>'
    +'</div>'
    +'<div style="margin-bottom:20px;">'
    +'<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--dim);margin-bottom:6px;"><span>Missions</span><span>'+pct+'%</span></div>'
    +'<div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">'
    +'<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#4ecf70,#4a9eff);border-radius:4px;"></div></div></div>'
    +'<div style="margin-bottom:20px;"><div style="font-size:0.75rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">&#x1F3C5; Badges</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'+badgesHTML+'</div></div>'
    +nextHTML
    +'<div style="margin-top:16px;"><div style="font-size:0.75rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">&#x1F3AF; Missions</div>'
    +missionsDetail+'</div></div>';

  document.body.appendChild(overlay);
}

// CINEMA FUNCTIONS — Internet Archive embed

let currentCinemaLang = '';
let currentCinemaCat  = '';

function openCinema(){
  currentCinemaLang = S.targetLang;
  const cats = getCinemaCats(currentCinemaLang);
  const langLabels = {en:'English',fr:'Français',es:'Español',ht:'Kreyòl',
                      de:'Deutsch',ru:'Русский',zh:'中文',ja:'日本語'};
  document.getElementById('cinema-title').textContent = '🎬 ' + (langLabels[currentCinemaLang]||'Cinéma');
  document.getElementById('cinema-lang-badge').textContent = FLAGS[currentCinemaLang]||'';
  document.getElementById('cinemaCats').innerHTML = cats.map((c,i)=>
    `<button onclick="loadCinemaCategory('${c.key}')" id="ccat-${c.key}"
       style="flex:0 0 auto;background:transparent;border:none;
              border-bottom:2px solid ${i===0?'#e040fb':'transparent'};
              color:${i===0?'#e040fb':'var(--dim)'};
              padding:10px 14px 8px;font-size:0.72rem;font-weight:800;
              cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;">
      ${c.icon} ${c.label}
    </button>`
  ).join('');
  if(cats.length) loadCinemaCategory(cats[0].key);
  showScreen('screen-cinema');
}

function loadCinemaCategory(catKey){
  currentCinemaCat = catKey;
  const cats = getCinemaCats(currentCinemaLang);
  cats.forEach(c=>{
    const el = document.getElementById('ccat-'+c.key);
    if(el){
      el.style.borderBottomColor = c.key===catKey ? '#e040fb' : 'transparent';
      el.style.color             = c.key===catKey ? '#e040fb' : 'var(--dim)';
    }
  });
  const videos = getCinemaVideos(currentCinemaLang, catKey);
  buildVideoGrid(videos);
}

function buildVideoGrid(videos){
  if(!videos.length){
    document.getElementById('videoList').innerHTML =
      `<div style="text-align:center;padding:40px;color:var(--dim)">
         <div style="font-size:2rem;margin-bottom:10px">🎬</div>
         <div>Bientôt disponible pour cette catégorie</div>
       </div>`;
    return;
  }
  document.getElementById('videoList').innerHTML = videos.map((v,i)=>`
    <div onclick="openArchiveVideo('${v.id}','${v.t.replace(/'/g,"&apos;")}')"
         style="background:var(--bg-card);border:1px solid rgba(224,64,251,0.18);
                border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s;
                display:flex;flex-direction:column;"
         onmouseover="this.style.borderColor='rgba(224,64,251,0.6)';this.style.transform='translateY(-2px)'"
         onmouseout="this.style.borderColor='rgba(224,64,251,0.18)';this.style.transform='translateY(0)'">
      <div style="position:relative;width:100%;padding-bottom:56.25%;background:linear-gradient(135deg,#1a0a2e,#0a0a14);flex-shrink:0;">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
          <div style="width:60px;height:60px;background:rgba(224,64,251,0.85);border-radius:50%;
                      display:flex;align-items:center;justify-content:center;font-size:1.6rem;
                      box-shadow:0 4px 20px rgba(224,64,251,0.4);">▶</div>
          <div style="font-size:0.65rem;color:rgba(255,255,255,0.5);letter-spacing:1px;">INTERNET ARCHIVE</div>
        </div>
        <div style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.75);
                    padding:3px 8px;border-radius:8px;font-size:0.65rem;color:#fff;font-weight:800;">${v.diff||''}</div>
        <div style="position:absolute;bottom:6px;right:8px;background:rgba(224,64,251,0.85);
                    padding:2px 7px;border-radius:6px;font-size:0.6rem;color:#fff;font-weight:900;">🌐 LIBRE</div>
      </div>
      <div style="padding:10px 13px 12px;">
        <div style="font-size:0.82rem;font-weight:800;color:#e040fb;margin-bottom:4px;line-height:1.35;">${v.t}</div>
        <div style="font-size:0.7rem;color:var(--dim);line-height:1.4;">${v.d}</div>
        <div style="margin-top:7px;font-size:0.65rem;color:rgba(224,64,251,0.6);font-weight:700;">
          📚 Domaine public — Internet Archive
        </div>
      </div>
    </div>`
  ).join('');
}

// Ouvre le lecteur inline Internet Archive
function openArchiveVideo(id, title){
  const embedUrl = `https://archive.org/embed/${id}`;
  // Mettre à jour l'iframe du lecteur cinéma
  const player = document.getElementById('cinemaPlayer');
  if(player){
    player.src = embedUrl;
    player.style.display = 'block';
    document.getElementById('videoTitle').textContent = title||'';
    document.getElementById('videoDesc').textContent = '📚 Source: Internet Archive — Domaine public';
    document.getElementById('videoList').scrollIntoView({behavior:'smooth'});
  }
  gainXP(5);
  // Aussi proposer d'ouvrir directement
  showNotif('🎬 '+title.substring(0,30)+'...');
}

// État missions
let S_missions = {
  completed: {},  // {missionId: true}
  gems: 0,
  badges: [],
};

function getMissionsForLoc(locId){
  return MISSIONS[locId] || [];
}

function openMissionsPanel(locId){
  const missions = getMissionsForLoc(locId);
  if(!missions.length) return;
  const nl = S.nativeLang || 'fr';
  const panel = document.getElementById('missionsPanel');
  if(!panel) return;

  // Header
  let html = '<div style="padding:12px 16px 8px;background:rgba(255,215,0,0.06);border-bottom:1px solid var(--border);">'
    + '<div style="font-family:Cinzel,serif;font-size:0.9rem;color:var(--gold);margin-bottom:2px;">🎯 Missions</div>'
    + '<div style="font-size:0.68rem;color:var(--dim)">💎 ' + S_missions.gems + ' gemmes &middot; ' + Object.keys(S_missions.completed).length + ' missions complètes</div>'
    + '</div><div style="overflow-y:auto;max-height:220px;padding:8px;">';

  missions.forEach(function(m){
    var done = S_missions.completed[m.id];
    var title = (m.title[nl]||m.title.fr||'').replace(/'/g,"&apos;");
    var desc  = (m.desc[nl] ||m.desc.fr ||'').replace(/'/g,"&apos;");
    var hint  = (m.hint[nl] ||m.hint.fr ||'').replace(/'/g,"&apos;");
    var xpBadge = done ? '&#x2705;' : ('+'+m.xp+' XP &middot; '+'💎'.repeat(m.gem));
    var clickAttr = done ? '' : ('onclick="startMission(\'' + m.id + '\',\'' + locId + '\')"');
    html += '<div style="background:' + (done?'rgba(78,207,112,0.08)':'var(--bg-card)')
      + ';border:1px solid ' + (done?'rgba(78,207,112,0.3)':'var(--border)')
      + ';border-radius:12px;padding:10px 12px;margin-bottom:7px;cursor:'+(done?'default':'pointer')+';transition:all 0.2s;" '
      + clickAttr + '>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
      + '<span style="font-size:1.2rem">'+m.icon+'</span>'
      + '<span style="font-weight:900;font-size:0.85rem;color:'+(done?'var(--green)':'var(--text)')+'">'+title+'</span>'
      + '<span style="margin-left:auto;font-size:0.7rem;color:'+(done?'var(--green)':'var(--gold)')+'">'+xpBadge+'</span>'
      + '</div>'
      + '<div style="font-size:0.72rem;color:var(--dim)">'+desc+'</div>'
      + (done ? '' : '<div style="font-size:0.68rem;color:rgba(255,215,0,0.6);margin-top:5px;font-style:italic">💡 '+hint+'</div>')
      + '</div>';
  });

  html += '</div>';
  panel.innerHTML = html;
  panel.style.display = 'block';
}

let activeMission = null;
function startMission(missionId, locId){
  const missions = getMissionsForLoc(locId);
  activeMission = missions.find(m=>m.id===missionId);
  if(!activeMission) return;
  const nl = S.nativeLang || 'fr';
  showNotif('🎯 Mission: '+activeMission.title[nl]||activeMission.title.fr);
  // Highlight input
  const inp = document.getElementById('dialInput');
  if(inp){
    inp.placeholder = '💡 '+( activeMission.hint[nl]||activeMission.hint.fr);
    inp.style.borderColor='var(--gold)';
  }
}

function checkMissionInMessage(text){
  if(!activeMission) return;
  const lower = text.toLowerCase();
  const done = activeMission.check.some(kw=>lower.includes(kw.toLowerCase()));
  if(done){
    completeMission(activeMission);
    activeMission = null;
    const inp = document.getElementById('dialInput');
    if(inp){inp.placeholder='Votre réponse...';inp.style.borderColor='';}
  }
}

function completeMission(mission){
  if(S_missions.completed[mission.id]) return;
  S_missions.completed[mission.id] = true;
  S_missions.gems += mission.gem;
  gainXP(mission.xp);
  // Update gem display
  const gd = document.getElementById('gemDisplay');
  if(gd) gd.textContent = '💎 '+S_missions.gems;
  // Check badges
  checkBadges();
  // Celebrate
  const nl = S.nativeLang||'fr';
  showMissionReward(mission, nl);
}

function showMissionReward(mission, nl){
  const overlay = document.createElement('div');
  overlay.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;`;
  overlay.innerHTML=`
    <div style="background:linear-gradient(135deg,#1a0a2e,#0a0a14);border:2px solid var(--gold);border-radius:24px;padding:28px 32px;text-align:center;max-width:300px;animation:popIn 0.4s;">
      <div style="font-size:3rem;margin-bottom:8px;">${mission.icon}</div>
      <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:1.1rem;margin-bottom:4px;">✅ Mission réussie!</div>
      <div style="color:var(--text);font-size:0.9rem;font-weight:800;margin-bottom:12px;" id="missionRewardTitle"></div>
      <div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px;">
        <span style="background:rgba(255,215,0,0.15);border:1px solid var(--gold);border-radius:12px;padding:6px 14px;color:var(--gold);font-weight:900;">+${mission.xp} XP ⭐</span>
        <span style="background:rgba(100,200,255,0.15);border:1px solid #4a9eff;border-radius:12px;padding:6px 14px;color:#4a9eff;font-weight:900;">${'💎'.repeat(mission.gem)} x${mission.gem}</span>
      </div>
      <button onclick="this.parentElement.parentElement.remove()" style="background:linear-gradient(135deg,#a86800,#ffd700);border:none;border-radius:12px;padding:10px 28px;font-family:'Cinzel',serif;font-weight:700;cursor:pointer;font-size:0.85rem;">🎉 Super!</button>
    </div>`;
  document.body.appendChild(overlay);
  var rt=document.getElementById('missionRewardTitle');
  if(rt) rt.textContent = mission.title[nl]||mission.title.fr;
  setTimeout(()=>overlay.remove(),4000);
  // Confetti effect
  launchConfetti();
}

function launchConfetti(){
  const colors=['#FFD700','#4ecf70','#4a9eff','#e040fb','#ff6b6b'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    c.style.cssText=`position:fixed;width:8px;height:8px;background:${color};border-radius:50%;
      left:${Math.random()*100}%;top:-10px;z-index:10000;
      animation:confettiFall ${1+Math.random()*2}s linear forwards;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

function checkBadges(){
  REWARDS.badges.forEach(badge=>{
    if(!S_missions.badges.includes(badge.id) && S.xp>=badge.xp){
      S_missions.badges.push(badge.id);
      showBadgeUnlocked(badge);
    }
  });
}

function showBadgeUnlocked(badge){
