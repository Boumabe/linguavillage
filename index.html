<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0f2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>LinguaVillage</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#FFD700;--gold-dim:#c8a030;--bg-deep:#0d0a1a;--bg-mid:#1a1030;
  --bg-card:rgba(255,255,255,0.06);--border:rgba(255,215,0,0.2);
  --text:#f0e8d0;--text-dim:#9a8a70;--success:#4ecf70;--error:#e05555;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-deep);font-family:'Nunito',sans-serif;color:var(--text);}
.screen{display:none;width:100%;height:100vh;position:relative;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}

/* NOTIF */
#notif{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(15,10,5,0.97);border:2px solid var(--gold);border-radius:30px;padding:10px 24px;color:var(--gold);font-weight:800;font-size:0.9rem;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING OVERLAY */
#loadingOverlay{position:fixed;inset:0;background:rgba(13,10,26,0.95);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#loadingOverlay.show{opacity:1;pointer-events:all;}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,215,0,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--gold-dim);font-size:0.9rem;font-weight:700;}

/* ===== SCREEN 1: WELCOME ===== */
#screen-welcome{background:radial-gradient(ellipse at 50% 0%,#1a3a6a 0%,#0d0a1a 70%);align-items:center;justify-content:center;}
.welcome-stars{position:absolute;inset:0;pointer-events:none;}
.w-star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.welcome-logo{font-family:'Cinzel',serif;font-size:clamp(2.2rem,8vw,4.5rem);font-weight:900;color:var(--gold);letter-spacing:3px;text-shadow:0 0 60px rgba(255,215,0,0.5);animation:logoGlow 3s ease-in-out infinite;position:relative;z-index:1;margin-bottom:6px;}
@keyframes logoGlow{0%,100%{text-shadow:0 0 40px rgba(255,215,0,0.4)}50%{text-shadow:0 0 80px rgba(255,215,0,0.8)}}
.welcome-sub{font-size:0.95rem;color:#a0b8d0;letter-spacing:2px;margin-bottom:28px;position:relative;z-index:1;}
.welcome-form{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:24px;width:min(400px,92vw);display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;backdrop-filter:blur(10px);}
.form-label{font-size:0.75rem;font-weight:900;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.form-input{width:100%;background:rgba(255,255,255,0.08);border:2px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--gold);}

/* Langue maternelle — ÉTAPE 1 : grandes tuiles avec drapeaux */
.native-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.native-tile{background:rgba(255,255,255,0.05);border:2px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-dim);}
.native-tile .t-flag{font-size:1.6rem;display:block;margin-bottom:4px;}
.native-tile .t-name{font-size:0.7rem;font-weight:800;line-height:1.2;}
.native-tile:hover,.native-tile.sel{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}

/* Langue cible */
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lang-opt{background:rgba(255,255,255,0.05);border:2px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;font-size:0.72rem;font-weight:800;transition:all 0.2s;color:var(--text-dim);}
.lang-opt .flag{font-size:1.4rem;display:block;margin-bottom:3px;}
.lang-opt:hover,.lang-opt.sel{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}
.lang-opt:disabled,.lang-opt.disabled{opacity:0.3;pointer-events:none;}

.play-btn{background:linear-gradient(135deg,#b87800,#ffd700,#b87800);color:#1a0800;border:none;padding:14px;border-radius:14px;font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,215,0,0.3);}
.play-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,0.5);}
.play-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ===== HUD ===== */
.village-hud{position:absolute;top:0;left:0;right:0;height:52px;z-index:100;background:linear-gradient(180deg,rgba(5,3,15,0.97),rgba(5,3,15,0.7));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;}
.hud-player{font-weight:900;font-size:0.88rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
.hud-lang-badge{background:rgba(255,215,0,0.12);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:0.75rem;font-weight:800;color:var(--gold-dim);white-space:nowrap;}
.hud-xp-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.hud-xp-label{font-size:0.72rem;color:var(--text-dim);}
.xp-bar-bg{width:70px;height:7px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#c8900a,#ffd700);border-radius:4px;transition:width 0.5s;width:0%;}
.hud-btns{display:flex;gap:5px;margin-left:6px;}
.hud-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:15px;font-size:0.72rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;white-space:nowrap;}
.hud-btn:hover{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}

/* ===== VILLAGE CANVAS ===== */
#villageCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer;}
.loc-tooltip{position:absolute;background:rgba(10,6,2,0.92);border:1px solid var(--gold);border-radius:10px;padding:6px 12px;font-size:0.78rem;font-weight:800;color:var(--gold);pointer-events:none;z-index:50;white-space:nowrap;transform:translate(-50%,-100%);margin-top:-8px;opacity:0;transition:opacity 0.2s;}
.loc-tooltip.show{opacity:1;}

/* ===== LOCATION SCREEN ===== */
.loc-header{background:linear-gradient(180deg,rgba(5,3,15,0.98),rgba(5,3,15,0.8));border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.loc-back{background:transparent;border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:15px;font-size:0.78rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.loc-back:hover{border-color:var(--gold);color:var(--gold);}
.loc-title-wrap{flex:1;}
.loc-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}
.loc-subtitle{font-size:0.72rem;color:var(--text-dim);}
.loc-learn-btn{background:rgba(255,215,0,0.1);border:1px solid var(--border);color:var(--gold-dim);padding:5px 12px;border-radius:15px;font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.loc-learn-btn:hover{background:rgba(255,215,0,0.2);border-color:var(--gold);color:var(--gold);}
.npc-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.npc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.25s;}
.npc-card:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.4);transform:translateX(4px);}
.npc-avatar-big{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
.npc-info{flex:1;}
.npc-card-name{font-weight:900;font-size:1rem;}
.npc-card-role{font-size:0.78rem;color:var(--text-dim);margin-top:2px;}
.npc-card-preview{font-size:0.8rem;color:var(--gold-dim);margin-top:4px;font-style:italic;}
.npc-arrow{color:var(--gold-dim);font-size:1.2rem;}

/* ===== DIALOGUE ===== */
.dial-header{background:linear-gradient(180deg,rgba(5,3,15,0.98),rgba(5,3,15,0.8));border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dial-npc-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.dial-npc-name{font-weight:900;font-size:0.95rem;color:var(--gold);}
.dial-npc-role{font-size:0.72rem;color:var(--text-dim);}
.dial-back{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:15px;font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.dial-back:hover{border-color:var(--gold);color:var(--gold);}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:10px;align-items:flex-end;max-width:85%;}
.msg.npc{align-self:flex-start;}
.msg.player{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.msg-bubble{padding:10px 14px;border-radius:16px;font-size:0.9rem;line-height:1.45;font-weight:600;}
.msg.npc .msg-bubble{background:rgba(255,255,255,0.09);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.player .msg-bubble{background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,160,0,0.15));border:1px solid rgba(255,215,0,0.3);border-bottom-right-radius:4px;}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:6px 0;}
.typing-dot{width:7px;height:7px;background:var(--gold-dim);border-radius:50%;animation:typingBounce 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.dial-input-area{padding:12px 14px 16px;background:rgba(5,3,15,0.95);border-top:1px solid var(--border);flex-shrink:0;}
.dial-input-row{display:flex;gap:10px;align-items:center;}
.dial-input{flex:1;background:rgba(255,255,255,0.07);border:2px solid var(--border);border-radius:25px;padding:11px 18px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;outline:none;transition:border-color 0.2s;}
.dial-input:focus{border-color:var(--gold);}
.dial-send{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#c8900a,#ffd700);color:#1a0800;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;font-weight:900;}
.dial-send:hover{transform:scale(1.1);box-shadow:0 0 15px rgba(255,215,0,0.4);}
.dial-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.dial-hint-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.dial-hint-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 12px;border-radius:15px;font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}
.dial-hint-btn:hover{border-color:var(--gold);color:var(--gold);}
.correction-box{margin-top:8px;background:rgba(78,207,112,0.1);border:1px solid rgba(78,207,112,0.3);border-radius:10px;padding:8px 12px;font-size:0.8rem;color:#4ecf70;display:none;}
.correction-box.error{background:rgba(224,85,85,0.1);border-color:rgba(224,85,85,0.3);color:#e05555;}
.correction-box.show{display:block;}

/* ===== LEARN ===== */
.learn-header{background:rgba(5,3,15,0.98);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.learn-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);flex:1;}
.learn-tabs{display:flex;gap:6px;padding:12px 16px 0;flex-shrink:0;overflow-x:auto;}
.learn-tab{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);padding:7px 14px;border-radius:20px;font-size:0.78rem;font-weight:800;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:'Nunito',sans-serif;}
.learn-tab.active,.learn-tab:hover{background:rgba(255,215,0,0.15);border-color:var(--gold);color:var(--gold);}
.learn-body{flex:1;overflow-y:auto;padding:14px;}
.learn-section-title{font-size:0.68rem;font-weight:900;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.vocab-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;}
.vocab-card:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.4);transform:translateY(-2px);}
.vocab-emoji{font-size:1.8rem;margin-bottom:5px;}
.vocab-target{font-size:1rem;font-weight:900;color:var(--gold);}
.vocab-roman{font-size:0.78rem;font-weight:700;color:var(--accent, #ff9f43);margin-top:2px;}
.vocab-native{font-size:0.75rem;color:var(--text-dim);margin-top:2px;}
.vocab-phonetic{font-size:0.65rem;color:#666;font-style:italic;margin-top:1px;}
.phrase-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.phrase-native{font-size:0.8rem;color:var(--text-dim);flex:1;}
.phrase-arrow{color:var(--border);font-size:0.8rem;flex-shrink:0;}
.phrase-target{font-size:0.88rem;font-weight:800;flex:1;text-align:right;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.2);border-radius:2px;}
</style>
</head>
<body>

<div id="notif"></div>
<div id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text" id="loadingText">Chargement...</div></div>

<!-- ====== SCREEN 1 : WELCOME ====== -->
<div class="screen active" id="screen-welcome">
  <div class="welcome-stars" id="welcomeStars"></div>
  <div class="welcome-logo">🏘️ LinguaVillage</div>
  <div class="welcome-sub" id="ws-tagline">Apprendre en vivant</div>
  <div class="welcome-form">

    <!-- ÉTAPE 1 : Langue maternelle (choisie EN PREMIER) -->
    <div>
      <div class="form-label" id="lbl-native">🌍 Votre langue maternelle</div>
      <div class="native-grid">
        <div class="native-tile" data-native="fr"><span class="t-flag">🇫🇷</span><span class="t-name">Français</span></div>
        <div class="native-tile" data-native="ht"><span class="t-flag">🇭🇹</span><span class="t-name">Kreyòl</span></div>
        <div class="native-tile" data-native="en"><span class="t-flag">🇬🇧</span><span class="t-name">English</span></div>
        <div class="native-tile" data-native="es"><span class="t-flag">🇪🇸</span><span class="t-name">Español</span></div>
        <div class="native-tile" data-native="de"><span class="t-flag">🇩🇪</span><span class="t-name">Deutsch</span></div>
        <div class="native-tile" data-native="ru"><span class="t-flag">🇷🇺</span><span class="t-name">Русский</span></div>
        <div class="native-tile" data-native="zh"><span class="t-flag">🇨🇳</span><span class="t-name">中文</span></div>
        <div class="native-tile" data-native="ja"><span class="t-flag">🇯🇵</span><span class="t-name">日本語</span></div>
      </div>
    </div>

    <!-- ÉTAPE 2 : Prénom (apparaît après choix langue) -->
    <div id="step2" style="display:none">
      <div class="form-label" id="lbl-name">✏️ Votre prénom</div>
      <input class="form-input" id="inputName" type="text" maxlength="20">
    </div>

    <!-- ÉTAPE 3 : Langue cible (apparaît après prénom) -->
    <div id="step3" style="display:none">
      <div class="form-label" id="lbl-target">🎯 Langue à apprendre</div>
      <div class="lang-grid" id="langGrid">
        <div class="lang-opt" data-lang="en"><span class="flag">🇬🇧</span>English</div>
        <div class="lang-opt" data-lang="fr"><span class="flag">🇫🇷</span>Français</div>
        <div class="lang-opt" data-lang="es"><span class="flag">🇪🇸</span>Español</div>
        <div class="lang-opt" data-lang="ht"><span class="flag">🇭🇹</span>Kreyòl</div>
        <div class="lang-opt" data-lang="de"><span class="flag">🇩🇪</span>Deutsch</div>
        <div class="lang-opt" data-lang="ru"><span class="flag">🇷🇺</span>Русский</div>
        <div class="lang-opt" data-lang="zh"><span class="flag">🇨🇳</span>中文</div>
        <div class="lang-opt" data-lang="ja"><span class="flag">🇯🇵</span>日本語</div>
      </div>
    </div>

    <button class="play-btn" id="playBtn" style="display:none" disabled>✨ Entrer dans le village</button>
  </div>
</div>

<!-- ====== SCREEN 2 : VILLAGE ====== -->
<div class="screen" id="screen-village">
  <div class="village-hud">
    <span class="hud-player" id="hudPlayer">👤</span>
    <span class="hud-lang-badge" id="hudLang"></span>
    <div class="hud-xp-wrap">
      <span class="hud-xp-label" id="hudXP">0 XP</span>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill"></div></div>
    </div>
    <div class="hud-btns">
      <button class="hud-btn" id="btn-learn-hud" onclick="openLearn()">📚</button>
      <button class="hud-btn" id="btn-menu-hud" onclick="showScreen('screen-welcome')">🏠</button>
    </div>
  </div>
  <canvas id="villageCanvas"></canvas>
  <div class="loc-tooltip" id="locTooltip"></div>
</div>

<!-- ====== SCREEN 3 : LOCATION ====== -->
<div class="screen" id="screen-location">
  <div class="loc-header">
    <button class="loc-back" id="btn-back-loc" onclick="showScreen('screen-village')">←</button>
    <div class="loc-title-wrap">
      <div class="loc-title" id="locTitle"></div>
      <div class="loc-subtitle" id="locSubtitle"></div>
    </div>
    <button class="loc-learn-btn" id="btn-learn-loc" onclick="openLearn()">📚</button>
  </div>
  <div class="npc-list" id="npcList"></div>
</div>

<!-- ====== SCREEN 4 : DIALOGUE ====== -->
<div class="screen" id="screen-dialogue">
  <div class="dial-header">
    <div class="dial-npc-avatar" id="dialAvatar">🧑</div>
    <div>
      <div class="dial-npc-name" id="dialNpcName"></div>
      <div class="dial-npc-role" id="dialNpcRole"></div>
    </div>
    <button class="dial-back" id="btn-back-dial" onclick="showScreen('screen-location')">←</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="dial-input-area">
    <div class="dial-input-row">
      <input class="dial-input" id="dialInput" type="text" autocomplete="off">
      <button class="dial-send" id="dialSend" onclick="sendMessage()">➤</button>
    </div>
    <div class="dial-hint-row">
      <button class="dial-hint-btn" id="btn-hint" onclick="requestHint()">💡</button>
      <button class="dial-hint-btn" id="btn-translate" onclick="requestTranslation()">🔤</button>
      <button class="dial-hint-btn" id="btn-correct" onclick="requestCorrection()">✅</button>
    </div>
    <div class="correction-box" id="correctionBox"></div>

document.querySelectorAll('.native-tile').forEach(tile=>{
  tile.addEventListener('click',()=>{
    document.querySelectorAll('.native-tile').forEach(t=>t.classList.remove('sel'));
    tile.classList.add('sel');
    S.nativeLang = tile.dataset.native;
    applyUILanguage(S.nativeLang);

    document.getElementById('step2').style.display='block';
    document.getElementById('step3').style.display='none';
    document.getElementById('playBtn').style.display='none';
    document.getElementById('playBtn').disabled=true;
    // Désactive langue cible identique
    document.querySelectorAll('.lang-opt').forEach(o=>{
      if(o.dataset.lang===S.nativeLang) o.classList.add('disabled');
      else o.classList.remove('disabled');
    });
  });
});

document.getElementById('inputName').addEventListener('input',function(){
  if(this.value.trim().length>0){
    document.getElementById('step3').style.display='block';
  } else {
    document.getElementById('step3').style.display='none';
    document.getElementById('playBtn').style.display='none';
  }
});

document.querySelectorAll('.lang-opt').forEach(opt=>{
  opt.addEventListener('click',()=>{
    if(opt.classList.contains('disabled')) return;
    document.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
    S.targetLang = opt.dataset.lang;
    document.getElementById('playBtn').style.display='block';
    document.getElementById('playBtn').disabled=false;
  });
});

document.getElementById('playBtn').addEventListener('click',()=>{
  S.playerName = document.getElementById('inputName').value.trim();
  if(!S.playerName||!S.nativeLang||!S.targetLang) return;
  startVillage();
});

function applyUILanguage(lang){
  ui = UI[lang] || UI['fr'];
  // Welcome screen
  document.getElementById('ws-tagline').textContent = ui.tagline;
  document.getElementById('lbl-native').textContent = ui.lbl_native;
  document.getElementById('lbl-name').textContent = ui.lbl_name;
  document.getElementById('inputName').placeholder = ui.name_placeholder;
  document.getElementById('lbl-target').textContent = ui.lbl_target;
  document.getElementById('playBtn').textContent = ui.play_btn;
  document.getElementById('loadingText').textContent = ui.loading;
  // HUD
  document.getElementById('btn-learn-hud').textContent = '📚';
  document.getElementById('btn-menu-hud').textContent = '🏠';
  // Dialogue buttons
  document.getElementById('btn-hint').textContent = ui.btn_hint;
  document.getElementById('btn-translate').textContent = ui.btn_translate;
  document.getElementById('btn-correct').textContent = ui.btn_correct;
  // Back buttons
  document.querySelectorAll('.loc-back,.dial-back').forEach(b=>b.textContent=ui.btn_back);
  // Learn
  document.getElementById('learn-title-text').textContent = ui.learn_title;
  // Learn tabs
  buildLearnTabs();
  // Learn/back buttons in loc
  const locLearn = document.getElementById('btn-learn-loc');
  if(locLearn) locLearn.textContent = '📚';
}

function buildLearnTabs(){
  const tabs = document.getElementById('learnTabs');
  if(!ui.tab_vocab) return;
  tabs.innerHTML = `
    <button class="learn-tab active" onclick="showLearnTab('vocab',this)">${ui.tab_vocab}</button>
    <button class="learn-tab" onclick="showLearnTab('grammar',this)">${ui.tab_grammar}</button>
    <button class="learn-tab" onclick="showLearnTab('phrases',this)">${ui.tab_phrases}</button>
    <button class="learn-tab" onclick="showLearnTab('context',this)">${ui.tab_context}</button>
  `;
}

let canvas, ctx, tick=0, hoveredLoc=null;

function startVillage(){
  const flags={en:'🇬🇧',fr:'🇫🇷',es:'🇪🇸',ht:'🇭🇹',de:'🇩🇪',ru:'🇷🇺',zh:'🇨🇳',ja:'🇯🇵'};
  const names={en:'English',fr:'Français',es:'Español',ht:'Kreyòl',de:'Deutsch',ru:'Русский',zh:'中文',ja:'日本語'};
  document.getElementById('hudPlayer').textContent='👤 '+S.playerName;
  document.getElementById('hudLang').textContent=(flags[S.targetLang]||'🌐')+' '+(names[S.targetLang]||S.targetLang);
  document.getElementById('learnLangBadge').textContent=(flags[S.targetLang]||'🌐')+' '+(names[S.targetLang]||S.targetLang);
  document.getElementById('hudXP').textContent='0 '+ui.xp_label;
  showScreen('screen-village');
  if(!canvas){
    canvas=document.getElementById('villageCanvas');
    canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
    ctx=canvas.getContext('2d');
    window.addEventListener('resize',()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;});
    canvas.addEventListener('click',onVillageClick);
    canvas.addEventListener('mousemove',onVillageHover);
    canvas.addEventListener('touchstart',onVillageTouch,{passive:true});
    requestAnimationFrame(villageLoop);
  }
}

function villageLoop(){ tick++; drawVillage(); requestAnimationFrame(villageLoop); }

function drawVillage(){
  if(!canvas||!ctx) return;
  const W=canvas.width,H=canvas.height;
  const sky=ctx.createLinearGradient(0,0,0,H*0.6);
  sky.addColorStop(0,'#0a1830'); sky.addColorStop(1,'#1a4880');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // Moon
  ctx.beginPath(); ctx.arc(W*0.88,H*0.1,24,0,Math.PI*2);
  ctx.fillStyle='#ffe0a0'; ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.88,H*0.1,34,0,Math.PI*2);
  ctx.fillStyle='rgba(255,224,160,0.1)'; ctx.fill();
  // Stars
  for(let i=0;i<35;i++){
    const sx=(Math.sin(i*437)*0.5+0.5)*W, sy=(Math.sin(i*293)*0.5+0.5)*H*0.42;
    ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,200,${0.3+0.7*Math.sin(tick*0.02+i)})`; ctx.fill();
  }
  // Ground
  const g=ctx.createLinearGradient(0,H*0.5,0,H);
  g.addColorStop(0,'#1a4a18'); g.addColorStop(1,'#0d2a0c');
  ctx.fillStyle=g; ctx.fillRect(0,H*0.5,W,H);
  // Path
  ctx.fillStyle='rgba(180,140,80,0.2)';
  ctx.beginPath(); ctx.moveTo(W*0.45,H*0.5); ctx.lineTo(W*0.38,H); ctx.lineTo(W*0.62,H); ctx.lineTo(W*0.55,H*0.5); ctx.fill();
  // Locations
  LOCATIONS.forEach(loc=>{
    const bob=Math.sin(tick*0.025+loc.x*10)*2;
    drawLoc(loc,loc.x*W,(loc.y*H)+bob,loc.w*W,loc.h*H,hoveredLoc===loc.id);
  });
}

function drawLoc(loc,x,y,w,h,hovered){
  const a=hovered?1:0.88;
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(x+3,y+3,w,h);
  ctx.fillStyle=hexAlpha(loc.color,a); ctx.fillRect(x,y,w,h);
  ctx.beginPath(); ctx.moveTo(x-5,y); ctx.lineTo(x+w/2,y-h*0.35); ctx.lineTo(x+w+5,y);
  ctx.fillStyle=hexAlpha(darken(loc.color),a); ctx.fill();
  ctx.fillStyle='rgba(30,15,5,0.8)';
  ctx.fillRect(x+w/2-w*0.12,y+h-h*0.3,w*0.24,h*0.3);
  if(hovered){ ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); }
  ctx.font=`${Math.min(w,h)*0.44}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(loc.emoji,x+w/2,y+h*0.35);
  // Name in native language
  const name = LOC_NAMES[loc.id]?.[S.nativeLang] || LOC_NAMES[loc.id]?.en || loc.id;
  ctx.font=`bold ${Math.max(9,Math.min(w*0.13,13))}px Nunito,sans-serif`;
  ctx.fillStyle=hovered?'#FFD700':'rgba(255,240,200,0.92)';
  ctx.fillText(name,x+w/2,y+h+13);
}

function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function darken(hex){return `#${[1,3,5].map(i=>Math.max(0,parseInt(hex.slice(i,i+2),16)-40).toString(16).padStart(2,'0')).join('')}`;}

function getLocAt(mx,my){
  const W=canvas.width,H=canvas.height;
  return LOCATIONS.find(l=>{const lx=l.x*W,ly=l.y*H,lw=l.w*W,lh=l.h*H;return mx>=lx&&mx<=lx+lw&&my>=ly-lh*0.35&&my<=ly+lh+18;});
}
function onVillageHover(e){
  const r=canvas.getBoundingClientRect(),l=getLocAt(e.clientX-r.left,e.clientY-r.top);
  hoveredLoc=l?l.id:null;
  const tip=document.getElementById('locTooltip');
  if(l){
    const name=LOC_NAMES[l.id]?.[S.nativeLang]||l.id;
    const desc=LOC_DESC[l.id]?.[S.nativeLang]||'';
    tip.textContent=l.emoji+' '+name+' — '+desc;
    tip.style.left=(l.x*canvas.width+l.w*canvas.width/2)+'px';
    tip.style.top=(l.y*canvas.height)+'px';
    tip.classList.add('show');
  } else tip.classList.remove('show');
}
function onVillageClick(e){const r=canvas.getBoundingClientRect(),l=getLocAt(e.clientX-r.left,e.clientY-r.top);if(l)openLocation(l);}
function onVillageTouch(e){const r=canvas.getBoundingClientRect(),t=e.touches[0],l=getLocAt(t.clientX-r.left,t.clientY-r.top);if(l)openLocation(l);}

async function npcOpenConversation(){
  const npc=S.currentNPC, loc=S.currentLocation;
  const targetLangName=getLangName(S.targetLang,S.nativeLang);
  showTyping();
  document.getElementById('dialSend').disabled=true;
  const prompt=`${npc.context}
Le joueur s'appelle ${S.playerName}.
Tu DOIS répondre UNIQUEMENT en ${LANG_NAMES[S.targetLang]||S.targetLang}.
Max 2 phrases courtes.

    const r=await fetch(`${API_BASE}/api/dialogue`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({npcName:npc.name,npcRole:typeof npc.role==='object'?npc.role.fr:npc.role,location:LOC_NAMES[loc.id]?.fr||loc.id,language:LANG_NAMES[S.targetLang],playerName:S.playerName,playerMessage:'__OPEN__',history:[],systemContext:prompt})});

function getOpeningFallback(npc){

}

  inp.value='';
  document.getElementById('correctionBox').className='correction-box';
  addMsg('player','😊',text);

Le joueur s'appelle ${S.playerName}.
Tu DOIS répondre UNIQUEMENT en ${LANG_NAMES[S.targetLang]||S.targetLang}.

  try{

  const last=S.chatHistory.filter(m=>m.role==='user').slice(-1)[0]?.content;

  try{
    const r=await fetch(`${API_BASE}/api/correct`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:last,language:LANG_NAMES[S.targetLang]||'anglais',nativeLanguage:LANG_NAMES[S.nativeLang]||'français'})});

  const data=GREET_DATA[targetLang]||GREET_DATA.en;

  const needsRoman = ['zh','ja','ru'].includes(targetLang);
  return data.greets.map((g,i)=>{

    de:[['Sujet + Verbe + Complément','Ich + esse + Apfel'],['Question','Verb + Sujet ?'],['Négation','nicht / kein'],['Genre','der/die/das']],
    ru:[['Sujet + Verbe + Complément','Я + ем + яблоко'],['Question','intonation montante'],['Négation','не + verbe'],['Genre','masculin/féminin/neutre']],
    zh:[['Sujet + Verbe + Complément','我 + 吃 + 苹果'],['Question','...吗？'],['Négation','不 + verbe'],['Pas de conjugaison','même forme']],
    ja:[['Sujet + Complément + Verbe','私 + りんご + 食べます'],['Politesse','verbe + です/ます'],['Question','phrase + か？'],['Négation','verbe + ません']],
  };
  const t=tips[tl]||tips.en;
  return t.map(r=>`<div class="phrase-card"><span class="phrase-native">${r[0]}</span><span class="phrase-arrow">→</span><span class="phrase-target">${r[1]}</span></div>`).join('');
}

function buildSurvivalPhrases(tl,nl){
  const phrases={
    en:{nativ:{fr:['Je ne comprends pas','Pouvez-vous répéter ?','Parlez lentement','Où est... ?','Combien ?','Au secours !','Je suis perdu·e'],ht:['Mwen pa konprann','Repete tanpri','Pale dousman','Ki kote... ?','Konbyen?','Ede m!','Mwen pèdi'],es:['No entiendo','¿Puede repetir?','Despacio','¿Dónde está?','¿Cuánto?','¡Ayuda!','Estoy perdido'],de:['Ich verstehe nicht','Bitte wiederholen','Langsam bitte','Wo ist...?','Wie viel?','Hilfe!','Ich bin verloren'],ru:['Не понимаю','Повторите','Медленнее','Где...?','Сколько?','Помогите!','Я потерялся'],zh:['我不明白','请再说','请说慢点','...在哪？','多少？','救命！','我迷路了'],ja:['わかりません','もう一度','ゆっくり','どこですか','いくら？','助けて！','迷子です']},target:["I don't understand","Can you repeat?","Please speak slowly","Where is...?","How much?","Help!","I'm lost"]},
    fr:{nativ:{en:['I don\'t understand','Can you repeat?','Speak slowly','Where is?','How much?','Help!','I\'m lost'],ht:['Mwen pa konprann','Repete tanpri','Pale dousman','Ki kote?','Konbyen?','Ede m!','Mwen pèdi']},target:['Je ne comprends pas','Pouvez-vous répéter ?','Parlez lentement','Où est... ?','Combien ?','Au secours !','Je suis perdu·e']},
  };
  const p=phrases[tl];
  const natives=p?.nativ?.[nl]||p?.target||[];
  const targets=p?.target||[];
  return targets.map((t,i)=>`<div class="phrase-card"><span class="phrase-native">${natives[i]||t}</span><span class="phrase-arrow">→</span><span class="phrase-target">${t}</span></div>`).join('');
}

// =================================================================
//  XP & UTILS
// =================================================================
function gainXP(n){
  S.xp+=n;
  const pct=S.xp%100;
  document.getElementById('hudXP').textContent=S.xp+' '+(ui.xp_label||'XP');
  document.getElementById('xpBarFill').style.width=pct+'%';
  const newLevel=Math.floor(S.xp/100)+1;
  if(newLevel>S.level){ S.level=newLevel; showNotif((ui.level_up||'🎉 Niveau')+' '+S.level+' !'); }
  else showNotif('+'+n+' '+(ui.xp_gained||'XP ⭐'));
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showNotif(msg){
  const n=document.getElementById('notif');
  n.textContent=msg; n.classList.add('show');
  clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove('show'),2200);
}

function showLoading(show){
  document.getElementById('loadingOverlay').classList[show?'add':'remove']('show');
}
